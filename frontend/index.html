<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movie Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0f172a; 
            color: white; 
            font-family: 'Inter', sans-serif;
        }
        .movie-card:hover { 
            transform: scale(1.05); 
            transition: 0.3s; 
            border-color: #3b82f6;
        }
        /* სქროლის სტილი */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="border-b border-gray-800 bg-gray-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold">M</div>
                <span class="text-xl font-bold tracking-tight text-white">AI<span class="text-blue-500">Movies</span></span>
            </div>

            <div id="authSection" class="flex items-center gap-4">
                <a href="login.html" class="text-gray-400 hover:text-white px-4 py-2 text-sm font-medium transition">
                    შესვლა
                </a>
                <a href="register.html" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-lg shadow-blue-900/20 transition">
                    რეგისტრაცია
                </a>
            </div>
        </div>
    </nav>

    <main class="p-8 flex-grow">
        <div class="max-w-4xl mx-auto text-center mt-12">
            <h1 class="text-5xl font-extrabold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">
                Movie Semantic Search
            </h1>
            <p class="mb-10 text-gray-400 text-lg">
                აღწერეთ თქვენთვის საურველი ფილმის სიჟეტი ან ნებისმიერი სცენა
            </p>

            <div class="flex flex-col md:flex-row gap-3 mb-16 p-2 bg-gray-800/50 rounded-2xl border border-gray-700 backdrop-blur-sm">
                <input id="queryInput" type="text" 
                       placeholder="მაგ: a story about time travel and deep space exploration..." 
                       class="flex-1 p-4 rounded-xl bg-gray-900 border border-gray-700 focus:outline-none focus:border-blue-500 text-white placeholder-gray-500 transition">
                
                <button onclick="searchMovies()" 
                        class="bg-blue-600 hover:bg-blue-700 px-10 py-4 rounded-xl font-bold transition flex items-center justify-center gap-2 group">
                    <span>ძებნა</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </button>
            </div>

            <div id="loader" class="hidden flex flex-col items-center gap-4 mb-12">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-blue-400 font-medium">AI აანალიზებს თქვენს მოთხოვნას...</p>
            </div>

            <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </div>
    </main>

    <footer class="mt-20 py-8 border-t border-gray-800 text-center text-gray-500 text-sm">
        <p>&copy; 2026 AI Movie Search Project. საბაკალავრო ნაშრომი.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
