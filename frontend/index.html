<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movie Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .movie-card:hover { transform: scale(1.05); transition: 0.3s; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-4xl font-bold mb-4 text-blue-400">Movie Semantic Search</h1>
        <p class="mb-8 text-gray-400">აღწერეთ როგორი ფილმის ნახვა გსურთ</p>

        <div class="flex gap-2 mb-12">
            <input id="queryInput" type="text" 
                   placeholder="მაგ: a space odyssey with psychological elements..." 
                   class="w-full p-4 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500">
            <button onclick="searchMovies()" 
                    class="bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded-lg font-bold">
                ძებნა
            </button>
        </div>

        <div id="loader" class="hidden text-xl text-blue-400 animate-pulse">AI ეძებს საუკეთესო ვარიანტებს...</div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
